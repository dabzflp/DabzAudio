<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0c0c0c" />

  <!-- SEO Meta Tags -->
  <title>Key & BPM Finder for Musicians, Producers, DJs | Dabz Audio</title>
  <meta name="description" content="Instantly find the musical key and BPM of any audio file. Dabz Audio's Key & BPM Finder is the fastest, most accurate tool for musicians, producers, and DJs. Works in your browser, no downloads required." />
  <meta name="keywords" content="audio key finder, bpm analyzer, music key detection, tempo detection, DJ tools, producer tools, music analysis, online key finder, online bpm analyzer, Dabz Audio, Dabz Flp" />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph Meta Tags -->
  <meta property="og:title" content="Key & BPM Finder for Musicians, Producers, DJs | Dabz Audio" />
  <meta property="og:description" content="Instantly find the musical key and BPM of any audio file. Dabz Audio's Key & BPM Finder is the fastest, most accurate tool for musicians, producers, and DJs. Works in your browser, no downloads required." />
  <meta property="og:image" content="../assets/img/dabzaudiobck.png" />
  <meta property="og:url" content="https://dabzaudio.com/key-bpm-tool" />
  <meta property="og:type" content="website" />

  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Key & BPM Finder for Musicians, Producers, DJs | Dabz Audio" />
  <meta name="twitter:description" content="Instantly find the musical key and BPM of any audio file. Dabz Audio's Key & BPM Finder is the fastest, most accurate tool for musicians, producers, and DJs. Works in your browser, no downloads required." />
  <meta name="twitter:image" content="../assets/img/dabzaudiobck.png" />

  <!-- iOS: allow the page to draw under the status bar and make it dark/translucent -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- All logic is now bundled in js/bundle.js -->
  <!-- external CSS only -->
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" type="image/png" href="../assets/img/dabzaudiobck.png" />
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <a class="brand-link" href="../index.html" aria-label="Back to Dabz Audio landing page">
        <div class="logo-circle">DA</div>
        <div class="brand-text">
          <h1>DabzAudio</h1>
        </div>
      </a>
    </div>
  </header>

  <main class="container">
    <section class="uploader">
      <!-- <h2>Upload audio</h2> -->
      <p>Drop a file or choose one (wav, mp3, m4a, ogg...).</p>

      <form id="uploadForm">
        <input type="file" id="audioFile" accept=".mp3,.wav,.m4a,.ogg,audio/*" />
        <button id="uploadBtn" type="button">Upload & Analyze</button>
        <button id="downloadReportBtn" type="button" class="download-report-btn" style="display:none" aria-label="Download analysis report as PDF">
          <span class="download-report-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path d="M12 3a1 1 0 0 1 1 1v8.59l2.3-2.3a1 1 0 1 1 1.4 1.42l-4 4a1 1 0 0 1-1.4 0l-4-4a1 1 0 1 1 1.4-1.42l2.3 2.3V4a1 1 0 0 1 1-1z"/>
              <path d="M5 19a1 1 0 0 1 1-1h12a1 1 0 1 1 0 2H6a1 1 0 0 1-1-1z"/>
            </svg>
          </span>
          <span class="download-report-label">Download report</span>
        </button>
      </form>

      <div id="status" class="status">No file selected.</div>
    </section>

    <section class="results">
      <!-- <h2>Analysis</h2> -->

      <div class="card">
        <h3>BPM </h3>
        <div id="bpmResult" class="big">—</div>
      </div>

      <div class="card">
        <h3>Key</h3>
        <div id="keyResult" class="big">—</div>
      </div>

      <div class="card live-key-card">
        <h3>Live Key</h3>
        <div id="liveKeyResult" class="big">—</div>
        <button id="liveKeyBtn" type="button" class="live-key-btn" aria-pressed="false" aria-label="Detect live key from microphone">
          <span class="live-key-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3z"/>
              <path d="M19 11a1 1 0 0 0-2 0 5 5 0 0 1-10 0 1 1 0 0 0-2 0 7 7 0 0 0 6 6.92V21a1 1 0 0 0 2 0v-3.08A7 7 0 0 0 19 11z"/>
            </svg>
          </span>
          <span class="live-key-label">Detect Live Key</span>
        </button>
        <div id="liveKeyStatus" class="live-key-status" role="status" aria-live="polite"></div>
      </div>

      <div class="card">
        <h3>Preview</h3>
        <audio id="player" controls></audio>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    © DabzAudio
  </footer>

  <!-- client-side JS (no inline) -->
  <script src="js/bundle.js"></script>
</body>
</html>
