<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111111" />
  <title>Forgot password | DabzAudio Lyric Book</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="../assets/css/dabz-glass.css" />
  <link rel="icon" type="image/png" href="../assets/img/dabzaudiobck.png" />
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
</head>
<body class="auth-bg dabz-lite">
  <header class="site-header">
    <a class="brand" href="../index.html" style="text-decoration:none">
      <span class="dabz-brand"><span class="sitename">DA</span><span class="dot">.</span></span>
      <div class="brand-text"><small>Lyric Book</small></div>
    </a>
    <a class="back-link" href="login.html">← Back to sign in</a>
  </header>

  <div class="auth-wrap">
    <form class="auth-card" id="forgotForm" novalidate>
      <h1>Reset your password</h1>
      <p class="sub">Enter your email and we'll send you a reset link.</p>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" autocomplete="email" required />
      </div>

      <button class="btn block" type="submit" id="submitBtn">Send reset link</button>
      <div class="msg" id="msg"></div>
      <div class="auth-foot"><a href="login.html">Back to sign in</a></div>
    </form>
  </div>

  <script src="js/forgot.js"></script>
  <script src="../assets/js/cookie-consent.js"></script>
</body>
</html>
