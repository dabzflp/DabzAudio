<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111111" />
  <title>Create account | DabzAudio Lyric Book</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="../assets/css/dabz-glass.css" />
  <link rel="icon" type="image/png" href="../assets/img/dabzaudiobck.png" />
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
</head>
<body class="auth-bg dabz-lite">
  <header class="site-header">
    <a class="brand" href="../index.html" style="text-decoration:none">
      <span class="dabz-brand"><span class="sitename">DA</span><span class="dot">.</span></span>
      <div class="brand-text"><small>Lyric Book</small></div>
    </a>
    <a class="back-link" href="../index.html">← All tools</a>
  </header>

  <div class="auth-wrap">
    <form class="auth-card" id="signupForm" novalidate style="max-width:460px">
      <h1>Create your artist account</h1>
      <p class="sub">Tell us a little about you so the Lyric Book fits your sound.</p>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" autocomplete="email" required />
      </div>
      <div class="row-2">
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" autocomplete="new-password" required />
          <div class="hint">At least 8 characters.</div>
        </div>
        <div class="field">
          <label for="password2">Confirm password</label>
          <input type="password" id="password2" autocomplete="new-password" required />
        </div>
      </div>

      <div class="row-2">
        <div class="field">
          <label for="displayName">Your name</label>
          <input type="text" id="displayName" autocomplete="name" />
        </div>
        <div class="field">
          <label for="artistName">Artist / stage name</label>
          <input type="text" id="artistName" />
        </div>
      </div>

      <div class="field">
        <label for="genre">What genre are you on?</label>
        <select id="genre">
          <option value="">Select a genre…</option>
          <option>Afrobeats</option>
          <option>Hip-Hop / Rap</option>
          <option>R&B / Soul</option>
          <option>Pop</option>
          <option>Drill</option>
          <option>Amapiano</option>
          <option>Dancehall</option>
          <option>Reggae</option>
          <option>Gospel</option>
          <option>Electronic / EDM</option>
          <option>Rock</option>
          <option>Country</option>
          <option>Other</option>
        </select>
      </div>

      <div class="field">
        <label for="influences">Who are your main influences? <span style="color:#6f6f6f">(optional)</span></label>
        <input type="text" id="influences" placeholder="e.g. Burna Boy, Drake, Sade" />
      </div>

      <div class="field">
        <label for="experience">How would you describe your experience? <span style="color:#6f6f6f">(optional)</span></label>
        <select id="experience">
          <option value="">Select…</option>
          <option>Just starting out</option>
          <option>Hobbyist</option>
          <option>Intermediate</option>
          <option>Gigging / releasing</option>
          <option>Professional</option>
        </select>
      </div>

      <button class="btn block" type="submit" id="submitBtn">Create account</button>
      <div class="msg" id="msg"></div>
      <div class="auth-foot">Already have an account? <a href="login.html">Sign in</a></div>
    </form>
  </div>

  <script src="js/signup.js"></script>
</body>
</html>
