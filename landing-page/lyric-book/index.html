<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111111" />
  <title>Lyric Book | DabzAudio</title>
  <meta name="description" content="DabzAudio Lyric Book - write, store and refine your lyrics with rhyme and rhythm suggestions." />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" type="image/png" href="../assets/img/dabzaudiobck.png" />
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card" style="text-align:center">
      <div class="logo-circle" style="margin:0 auto 14px">DA</div>
      <h1>Lyric Book</h1>
      <p class="sub">Loading…</p>
    </div>
  </div>
  <script>
    // Simple router: send signed-in artists to the app, others to login.
    (async function () {
      if (!window.LB.isAuthed()) {
        location.replace("login.html");
        return;
      }
      try {
        await window.LB.apiFetch("/api/auth/me");
        location.replace("app.html");
      } catch {
        window.LB.clearToken();
        location.replace("login.html");
      }
    })();
  </script>
</body>
</html>
